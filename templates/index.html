{% extends "base.html" %}
{% block content %}
<div class="home-page">
    <div class="hero">
        <div class="hero-icon">AI</div>
        <h1>{{ site_settings.get('site_name', 'AI Code Assistant') }}</h1>
        <p>{{ site_settings.get('site_description', 'Ton assistant IA de codage. Pose des questions, obtiens des reponses, apprends a coder.') }}</p>
        <div class="cta-buttons">
            <a href="{{ url_for('auth.register') }}" class="btn btn-primary">Commencer</a>
            <a href="{{ url_for('auth.login') }}" class="btn btn-outline">Se connecter</a>
        </div>
    </div>
</div>
{% endblock %}
